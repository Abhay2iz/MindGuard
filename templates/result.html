<!DOCTYPE html>
<html>

<head>

  <title>MindGuard Result</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

body{
background:#f4f6f9;
font-family:Arial;
}

header{
background:#4facfe;
color:white;
padding:30px;
text-align:center;
}

.section{
padding:50px;
}

.result-card{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0px 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

footer{
background:#222;
color:white;
text-align:center;
padding:15px;
margin-top:50px;
}

</style>

</head>

<body>

<header>

  <h1>🧠 MindGuard</h1>

  <p>AI Powered Stress Detection System</p>

</header>


<div class="container section">

  <div class="row justify-content-center">

    <div class="col-md-6">

      <div class="result-card">

        <h2>Analysis Result</h2>

        <h4 class="mt-3 text-primary">

          {{ prediction }}

        </h4>


        <div class="progress mt-4">

          <div class="progress-bar
{% if score > 70 %}
bg-danger
{% elif score > 40 %}
bg-warning
{% else %}
bg-success
{% endif %}
" style="width: {{score}}%">

            {{score}}% Stress Level

          </div>

        </div>


        <h4 class="mt-4">MindGuard Suggestion</h4>

        <p>

          {{ advice }}

        </p>


        <a href="/" class="btn btn-primary mt-3 w-100">

          Analyze Again

        </a>

      </div>

    </div>

  </div>

</div>


<footer>

  <p>Developed by Abhay Agrahari | MindGuard AI Project</p>

</footer>


</body>

</html>
